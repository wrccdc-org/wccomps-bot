name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wccomps
          POSTGRES_PASSWORD: wccomps
          POSTGRES_DB: wccomps_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: wccomps
      DB_PASSWORD: wccomps
      DB_NAME: wccomps_test

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          uv sync

      - name: Check code formatting
        run: |
          uv run ruff format --check .

      - name: Run linting
        run: |
          uv run ruff check .

      - name: Run type checking
        run: |
          DJANGO_SETTINGS_MODULE=wccomps.settings uv run mypy

      - name: Check for unapplied migrations
        run: |
          cd web && DJANGO_SETTINGS_MODULE=wccomps.settings uv run python manage.py makemigrations --check --dry-run

      - name: Collect static files
        run: |
          cd web && DJANGO_SETTINGS_MODULE=wccomps.settings uv run python manage.py collectstatic --noinput
        env:
          SECRET_KEY: test-secret-key-for-ci

      - name: Run tests
        run: |
          uv run pytest -m "not browser"
        env:
          DJANGO_SETTINGS_MODULE: wccomps.settings
          PYTHONPATH: ${{ github.workspace }}/web:${{ github.workspace }}
          SECRET_KEY: test-secret-key-for-ci
