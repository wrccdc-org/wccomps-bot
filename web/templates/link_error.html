{% extends "base.html" %}

{% block title %}Link Error - WCComps{% endblock %}

{% block content %}
<div id="content-main">
    <c-page_header title="{{ error }}" />

    <c-module>
        <c-alert variant="error">
            <p style="margin: 0;">There was a problem linking your account</p>
        </c-alert>

        <c-fieldset>
            <p>{{ message }}</p>
        </c-fieldset>

        <p style="margin-top: 20px;">
            Please return to Discord and try again. If the problem persists, contact an administrator for assistance.
        </p>
    </c-module>
</div>
{% endblock %}
