{% extends "scoring/base.html" %}
{% block scoring_content %}
    <script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('clearableForm', () => ({
            clearForm() { this.$el.querySelectorAll("input[name^='points_team_']").forEach(i => i.value = ''); }
        }));
    });
    </script>
    {% load cotton %}
    <c-page_header title="Inject Grading" />
    <c-module>
    {% if not quotient_available %}
        <c-alert variant="error">
        <strong>Connection Error</strong>
        <p class="mb-0">Unable to connect to Quotient. Check the API URL and credentials.</p>
        </c-alert>
    {% elif no_injects %}
        <c-empty_state title="No injects" description="No injects are configured in Quotient yet." />
    {% else %}
        <c-form_field label="Select Inject" id="inject-select">
        <select id="inject-select"
                class="vTextField"
                hx-get="{% url 'scoring:inject_grading' %}"
                hx-target="#inject-grading-content"
                hx-swap="outerHTML"
                hx-push-url="true"
                hx-include="this"
                name="inject">
            <option value="">-- Select an inject to grade --</option>
            {% for id, title in inject_choices %}
                <option value="{{ id }}" {% if id == selected_inject_id %}selected{% endif %}>{{ title }}</option>
            {% endfor %}
        </select>
        </c-form_field>
        <c-inject_grading_content :selected_inject="selected_inject" :selected_inject_id="selected_inject_id" :team_data="team_data" :inject_choices="inject_choices" />
    {% endif %}
    </c-module>
{% endblock scoring_content %}
