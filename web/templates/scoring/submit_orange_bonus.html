{% extends "scoring/base.html" %}
{% load crispy_forms_tags %}

{% block scoring_content %}
<c-module>
    <h2>Submit Orange Team Adjustment</h2>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}

        <c-alert variant="info" style="margin-top: 15px;">
            <strong>Note:</strong> Use positive numbers to award points, negative numbers to deduct points.
        </c-alert>

        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <c-button type="submit" variant="warning">Submit Adjustment</c-button>
            <c-link href="{% url 'scoring:orange_team_portal' %}">Cancel</c-link>
        </div>
    </form>
</c-module>
{% endblock %}
