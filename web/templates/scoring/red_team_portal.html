{% extends "scoring/red_base.html" %}
{% load cotton %}
{% block title %}
    All Findings - Red Team
{% endblock title %}
{% block red_content %}
    <c-page_header title="All Findings" />
    <c-module filtered="true" id="changelist">
    <c-filter_toolbar form_id="changelist-filter" hx_get="{% url 'scoring:red_team_findings' %}" hx_target="#red-findings-content" hx_swap="outerHTML" hx_push_url="true">
    {% if is_gold_team and pending_findings %}
        <c-slot name="actions">
        <c-button type="button" id="bulk-approve-btn" onclick="document.dispatchEvent(new CustomEvent('bulk-approve'))" variant="success">Approve Selected</c-button>
        </c-slot>
    {% endif %}
    <c-filter_field label="Status" id="id_status">
    <select name="status" id="id_status" aria-label="Filter by status">
        <option value="pending"
                {% if status_filter == 'pending' %}selected{% endif %}>Pending Only</option>
        <option value="reviewed"
                {% if status_filter == 'reviewed' %}selected{% endif %}>Reviewed Only</option>
        <option value="all" {% if status_filter == 'all' %}selected{% endif %}>All</option>
    </select>
    </c-filter_field>
    <c-filter_field label="Target Team" id="id_team">
    <select name="team" id="id_team" aria-label="Filter by team">
        <option value="">All Teams</option>
        {% for team in available_teams %}
            <option value="{{ team.id }}"
                    {% if selected_team == team.id|stringformat:"s" %}selected{% endif %}>{{ team.team_name }}</option>
        {% endfor %}
    </select>
    </c-filter_field>
    <c-filter_field label="Attack Type" id="id_attack_type" min_width="150px">
    <select name="attack_type"
            id="id_attack_type"
            aria-label="Filter by attack type">
        <option value="">All Attack Types</option>
        {% for attack_type in available_attack_types %}
            <option value="{{ attack_type.id }}"
                    {% if selected_attack_type == attack_type.id|stringformat:"s" %}selected{% endif %}>
                {{ attack_type.name }}
            </option>
        {% endfor %}
    </select>
    </c-filter_field>
    <c-filter_field label="Submitter" id="id_submitter">
    <select name="submitter" id="id_submitter" aria-label="Filter by submitter">
        <option value="">All Submitters</option>
        {% for user in available_submitters %}
            <option value="{{ user.id }}"
                    {% if selected_submitter == user.id|stringformat:"s" %}selected{% endif %}>
                {{ user.username }}
            </option>
        {% endfor %}
    </select>
    </c-filter_field>
    </c-filter_toolbar>
    <c-red_findings_table :findings="findings" :page_obj="page_obj" :status_filter="status_filter" :selected_team="selected_team" :selected_attack_type="selected_attack_type" :selected_submitter="selected_submitter" :sort_by="sort_by" :is_gold_team="is_gold_team" />
    </c-module>
{% endblock red_content %}
