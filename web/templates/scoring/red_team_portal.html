{% extends "scoring/red_base.html" %}
{% load cotton %}

{% block title %}All Findings - Red Team{% endblock %}

{% block red_content %}
<c-page_header title="All Findings" />
    <c-module filtered="true" id="changelist">
        <div class="toolbar d-flex justify-between items-start gap-15">
            <form
                id="changelist-filter"
                method="GET"
                hx-get="{% url 'scoring:red_team_findings' %}"
                hx-target="#red-findings-content"
                hx-swap="outerHTML"
                hx-push-url="true"
                role="search"
                aria-label="Filter results"
                class="flex-1">
                <div id="filter-content">
                    <div class="d-flex gap-10 flex-wrap items-end">
                        <c-filter_field label="Status" id="id_status">
                            <select name="status" id="id_status" aria-label="Filter by status" hx-trigger="change">
                                <option value="pending" {% if status_filter == 'pending' %}selected{% endif %}>Pending Only</option>
                                <option value="reviewed" {% if status_filter == 'reviewed' %}selected{% endif %}>Reviewed Only</option>
                                <option value="all" {% if status_filter == 'all' %}selected{% endif %}>All</option>
                            </select>
                        </c-filter_field>

                        <c-filter_field label="Target Team" id="id_team">
                            <select name="team" id="id_team" aria-label="Filter by team" hx-trigger="change">
                                <option value="">All Teams</option>
                                {% for team in available_teams %}
                                    <option value="{{ team.id }}" {% if selected_team == team.id|stringformat:"s" %}selected{% endif %}>
                                        {{ team.team_name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </c-filter_field>

                        <c-filter_field label="Attack Type" id="id_attack_type" min_width="150px">
                            <select name="attack_type" id="id_attack_type" aria-label="Filter by attack type" hx-trigger="change">
                                <option value="">All Attack Types</option>
                                {% for attack_type in available_attack_types %}
                                    <option value="{{ attack_type.id }}" {% if selected_attack_type == attack_type.id|stringformat:"s" %}selected{% endif %}>
                                        {{ attack_type.name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </c-filter_field>

                        <c-filter_field label="Submitter" id="id_submitter">
                            <select name="submitter" id="id_submitter" aria-label="Filter by submitter" hx-trigger="change">
                                <option value="">All Submitters</option>
                                {% for user in available_submitters %}
                                    <option value="{{ user.id }}" {% if selected_submitter == user.id|stringformat:"s" %}selected{% endif %}>
                                        {{ user.username }}
                                    </option>
                                {% endfor %}
                            </select>
                        </c-filter_field>
                    </div>
                </div>
            </form>
            {% if is_gold_team and pending_findings %}
            <div class="filter-actions d-flex gap-10 items-end">
                <c-button type="button" id="bulk-approve-btn" onclick="document.dispatchEvent(new CustomEvent('bulk-approve'))" variant="success">Approve Selected</c-button>
            </div>
            {% endif %}
        </div>

        <c-red_findings_table :findings="findings" :page_obj="page_obj" :status_filter="status_filter" :selected_team="selected_team" :selected_attack_type="selected_attack_type" :selected_submitter="selected_submitter" :sort_by="sort_by" :is_gold_team="is_gold_team" />
    </c-module>
{% endblock red_content %}
