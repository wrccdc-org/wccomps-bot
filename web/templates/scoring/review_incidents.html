{% extends "scoring/base.html" %}
{% load cotton %}
{% block title %}
    Review Incident Reports
{% endblock title %}
{% block scoring_content %}
    <script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('incidentsBulkSelect', () => ({
            selected: [],
            selectableIds: [],
            submitting: false,
            init() { this.selectableIds = Array.from(this.$el.querySelectorAll('[data-incident-id]')).map(el => el.dataset.incidentId); },
            get allSelected() { return this.selected.length === this.selectableIds.length && this.selectableIds.length > 0; },
            get someSelected() { return this.selected.length > 0 && this.selected.length < this.selectableIds.length; },
            toggleAll() { this.selected = this.allSelected ? [] : [...this.selectableIds]; },
            submitBulk() {
                if (this.submitting) return;
                if (this.selected.length === 0) { alert('Please select at least one incident to approve'); return; }
                if (confirm('Approve ' + this.selected.length + ' incident(s)? This action cannot be undone.')) { this.submitting = true; this.$refs.bulkForm.submit(); }
            }
        }));
    });
    </script>
    <c-page_header title="Review Incident Reports" />
    <c-module filtered="true" id="changelist">
    <c-filter_toolbar form_id="changelist-filter" hx_get="{% url 'scoring:review_incidents' %}" hx_target="#review-incidents-content" hx_swap="outerHTML" hx_push_url="true">
    {% if has_pending %}
        <c-slot name="actions">
        <c-button type="button" onclick="document.dispatchEvent(new CustomEvent('bulk-approve-incidents'))" variant="primary">Approve Selected</c-button>
        </c-slot>
    {% endif %}
    <c-filter_field label="Status" id="id_status">
    <select name="status" id="id_status" aria-label="Filter by status">
        <option value="pending"
                {% if status_filter == 'pending' %}selected{% endif %}>Pending Only</option>
        <option value="approved"
                {% if status_filter == 'approved' %}selected{% endif %}>Approved Only</option>
        <option value="all" {% if status_filter == 'all' %}selected{% endif %}>All</option>
    </select>
    </c-filter_field>
    <c-filter_field label="Team" id="id_team">
    <select name="team" id="id_team" aria-label="Filter by team">
        <option value="">All Teams</option>
        {% for team in available_teams %}
            <option value="{{ team.id }}"
                    {% if selected_team == team.id|stringformat:"s" %}selected{% endif %}>
                Team {{ team.team_number }}
            </option>
        {% endfor %}
    </select>
    </c-filter_field>
    <c-filter_field label="Box" id="id_box" min_width="120px">
    <input type="text"
           name="box"
           id="id_box"
           value="{{ selected_box|default:'' }}"
           placeholder="Box name..."
           aria-label="Filter by box">
    </c-filter_field>
    <c-filter_field label="Search" id="id_search" min_width="180px">
    <input type="text"
           name="search"
           id="id_search"
           value="{{ search_query }}"
           placeholder="Search..."
           aria-label="Search incidents">
    </c-filter_field>
    </c-filter_toolbar>
    <c-review_incidents_table :page_obj="page_obj" :status_filter="status_filter" :selected_team="selected_team" :selected_box="selected_box" :search_query="search_query" :sort_by="sort_by" />
    </c-module>
{% endblock scoring_content %}
