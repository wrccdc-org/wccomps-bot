{% extends "registration/admin_base.html" %}
{% load cotton %}

{% block title %}Review Registrations - WCComps{% endblock %}

{% block registration_content %}
<div id="content-main">
    <c-page_header title="Team Registration Review" />

    {% if messages %}
        {% for message in messages %}
            <c-alert variant="{% if message.tags == 'error' %}error{% elif message.tags == 'success' %}success{% else %}info{% endif %}">
                {{ message }}
            </c-alert>
        {% endfor %}
    {% endif %}

    <c-module filtered="true">
        <c-filter_toolbar hx_get="{% url 'registration_review_list' %}" hx_target="#registration-review-content" hx_swap="outerHTML" hx_push_url="true">
            <c-filter_field label="Status" id="id_status">
                <select name="status" id="id_status" aria-label="Filter by status">
                    <option value="">All Statuses</option>
                    {% for value, label in status_choices %}
                        <option value="{{ value }}" {% if value == status_filter %}selected{% endif %}>
                            {{ label }}
                        </option>
                    {% endfor %}
                </select>
            </c-filter_field>
        </c-filter_toolbar>

        <c-registration_review_table :registrations="registrations" />
    </c-module>
</div>
{% endblock %}
