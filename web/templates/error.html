{% extends "admin/base_site.html" %}
{% load cotton %}
{% block title %}
    Error - WCComps
{% endblock title %}
{% block content %}
    <div id="content-main">
        <c-page_header title="{{ error }}" />
        <c-module>
        <c-alert variant="error">
        <p class="m-0">{{ error }}</p>
        </c-alert>
        <c-fieldset>
        <p>{{ message }}</p>
        </c-fieldset>
        <p class="mt-20">If you believe this is an error, please contact an administrator for assistance.</p>
        </c-module>
    </div>
{% endblock content %}
