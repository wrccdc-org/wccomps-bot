{% extends "scoring/base.html" %}
{% load cotton %}
{% block title %}
    Review Tickets
{% endblock title %}
{% block scoring_content %}
    <script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('ticketsBulkSelect', () => ({
            ...bulkSelectMixin('ticket-id'),
            init() { this.initBulkSelect(); },
            submitBulk() {
                if (this.submitting) return;
                if (this.selected.length === 0) { alert('Please select at least one ticket to approve'); return; }
                if (confirm('Approve ' + this.selected.length + ' ticket(s)? This action cannot be undone.')) { this.submitting = true; this.$refs.bulkForm.submit(); }
            }
        }));
    });
    </script>
    <c-page_header title="Review Tickets" />
    <c-module filtered="true" id="changelist">
    <c-filter_toolbar form_id="changelist-filter" hx_get="{% url 'ops_review_tickets' %}" hx_target="#review-tickets-content" hx_swap="outerHTML" hx_push_url="true">
    {% if has_pending %}
        <c-slot name="actions">
        <c-button type="button" onclick="document.dispatchEvent(new CustomEvent('bulk-approve-tickets'))" variant="primary">Approve Selected</c-button>
        </c-slot>
    {% endif %}
    <c-filter_field label="Status" id="id_status">
    <select name="status" id="id_status" aria-label="Filter by status">
        <option value="pending"
                {% if status_filter == 'pending' %}selected{% endif %}>Pending Only</option>
        <option value="approved"
                {% if status_filter == 'approved' %}selected{% endif %}>Approved Only</option>
        <option value="all" {% if status_filter == 'all' %}selected{% endif %}>All</option>
    </select>
    </c-filter_field>
    <c-filter_field label="Team" id="id_team">
    <input type="number"
           name="team"
           id="id_team"
           value="{{ team_filter }}"
           placeholder="Team #"
           aria-label="Filter by team number">
    </c-filter_field>
    <c-filter_field label="Category" id="id_category">
    <select name="category" id="id_category" aria-label="Filter by category">
        <option value="">All Categories</option>
        {% for cat in categories %}
            <option value="{{ cat.id }}"
                    {% if category_filter == cat.id %}selected{% endif %}>{{ cat.display_name }}</option>
        {% endfor %}
    </select>
    </c-filter_field>
    <c-filter_field label="Search" id="id_search" min_width="180px">
    <input type="text"
           name="search"
           id="id_search"
           value="{{ search_query }}"
           placeholder="Search..."
           aria-label="Search tickets">
    </c-filter_field>
    </c-filter_toolbar>
    <c-review_tickets_table :page_obj="page_obj" :status_filter="status_filter" :team_filter="team_filter" :category_filter="category_filter" :search_query="search_query" :sort_by="sort_by" />
    </c-module>
{% endblock scoring_content %}
