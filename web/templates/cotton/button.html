{# Button component - styled action buttons #}
{# Usage: <c-button variant="primary" type="submit">Save</c-button> #}
{# Props: variant (default|primary|danger|cancel), type (button|submit), class (additional classes), id, name, value #}

<c-vars variant="default" type="button" class="" id="" name="" value="" />

<button
    type="{{ type }}"
    {% if id %}id="{{ id }}"{% endif %}
    {% if name %}name="{{ name }}"{% endif %}
    {% if value %}value="{{ value }}"{% endif %}
    class="button {{ class }}
    {% if variant == 'primary' %}default
    {% elif variant == 'danger' %}deletelink
    {% elif variant == 'cancel' %}cancel-link
    {% endif %}"
    style="padding: 8px 16px !important; font-size: 13px !important; min-width: 80px; cursor: pointer;
    {% if variant == 'danger' %}background: #ba2121; color: white;{% endif %}">
    {{ slot }}
</button>
