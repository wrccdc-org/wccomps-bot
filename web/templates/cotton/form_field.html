{# Form field component - standard form row with label and input #}
{# Usage: <c-form_field label="Email" required="true">{{ form.email }}</c-form_field> #}
{# Props: label, required (bool), help_text, error, id #}

<c-vars label="" required="false" help_text="" error="" id="" />

<div class="form-row">
    <div>
        <label {% if id %}for="{{ id }}"{% endif %}{% if required == "true" %} class="required"{% endif %}>
            {{ label }}:
        </label>
        {{ slot }}
        {% if help_text %}
        <p class="help-text">{{ help_text }}</p>
        {% endif %}
        {% if error %}
        <p class="errornote">{{ error }}</p>
        {% endif %}
    </div>
</div>
