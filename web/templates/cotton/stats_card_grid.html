{# Stats card grid component - responsive grid for displaying multiple stats cards #}
{# Usage: <c-stats_card_grid cols="3">multiple <c-stats_card> components</c-stats_card_grid> #}
{# Props: cols (optional: number of columns, default "3"), gap (optional: spacing, default "20px") #}

<c-vars cols="3" gap="20px" />

<style>
    .stats-card-grid {
        display: grid;
        grid-template-columns: repeat({{ cols }}, 1fr);
        gap: {{ gap }};
        text-align: center;
    }

    @media (max-width: 768px) {
        .stats-card-grid {
            grid-template-columns: 1fr;
        }
    }
</style>

<div class="stats-card-grid">
    {{ slot }}
</div>
