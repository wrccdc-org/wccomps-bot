{# Alert/Message component - displays info, warning, error messages #}
{# Usage: <c-alert variant="error">Something went wrong</c-alert> #}
{# Props: variant (info|warning|error|success), class #}

<c-vars variant="info" class="" />

<div class="{{ class }}" style="padding: 10px; margin: 10px 0; border-radius: 4px;
    {% if variant == 'error' %}background: #ffebee; border-left: 4px solid #ba2121; color: #ba2121;
    {% elif variant == 'warning' %}background: #fff3cd; border-left: 4px solid #ffc107; color: #856404;
    {% elif variant == 'success' %}background: #e8f5e9; border-left: 4px solid #388e3c; color: #388e3c;
    {% elif variant == 'info' %}background: #e8f4f8; border-left: 4px solid #417690; color: #417690;
    {% else %}background: #f5f5f5; border-left: 4px solid #999; color: #333;{% endif %}">
    {{ slot }}
</div>
