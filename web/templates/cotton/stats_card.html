{# Stats card component - displays statistics with value and label #}
{# Usage: <c-stats_card value="42" label="Total Teams" color="primary" /> #}
{# Props: value (stat to display), label (description), color (primary|success|warning|danger) #}

<c-vars value="" label="" color="primary" />

<style>
    .stats-card {
        text-align: center;
        padding: 20px;
        background: #f8f9fa;
        border-radius: 4px;
        border: 1px solid #dee2e6;
    }

    .stats-card-value {
        font-size: 48px;
        font-weight: 700;
        margin-bottom: 8px;
    }

    .stats-card-value.primary { color: #417690; }
    .stats-card-value.success { color: #28a745; }
    .stats-card-value.warning { color: #ffc107; }
    .stats-card-value.danger { color: #dc3545; }

    .stats-card-label {
        font-size: 14px;
        color: #6c757d;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
</style>

<div class="stats-card">
    <div class="stats-card-value {{ color }}">
        {{ value }}
    </div>
    <div class="stats-card-label">
        {{ label }}
    </div>
</div>
