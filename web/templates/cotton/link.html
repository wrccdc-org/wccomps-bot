{# Link component - styled links #}
{# Usage: <c-link href="/back" variant="history">Back</c-link> #}
{# Props: href, variant (default|primary|history|add|change|danger|cancel), class, id #}
<c-vars href="#" variant="default" class id />
<a href="{{ href }}"
   {% if id %}id="{{ id }}"{% endif %}
   {{ attrs }}
   class="{% if variant == 'primary' %}button default {% elif variant == 'history' %}historylink {% elif variant == 'add' %}addlink {% elif variant == 'change' %}changelink {% elif variant == 'danger' %}button deletelink {% elif variant == 'cancel' %}btn-secondary {% endif %}{{ class }}">
    {{ slot }}
</a>
