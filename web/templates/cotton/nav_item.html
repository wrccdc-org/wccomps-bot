{# Navigation item component - individual nav link with current state highlighting #}
{# Usage: <c-nav_item name="leaderboard" href="/scoring/">Leaderboard</c-nav_item> #}
{# Props: name (for matching current), href (link URL) #}
{# Note: 'current' prop is inherited from parent c-nav component #}

<c-vars name="" href="#" />

<a
    href="{{ href }}"
    {% if name == current %}aria-current="page"{% endif %}
    style="display: inline-block; margin-right: 10px; padding: 8px 12px; text-decoration: none;
    {% if name == current %}font-weight: bold; color: #fff;
    {% else %}color: #447e9b;{% endif %}">
    {{ slot }}
</a>
