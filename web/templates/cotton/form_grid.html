{# Form grid component - responsive grid layout for form fields #}
{# Usage: <c-form_grid min_width="200px" gap="15px">form fields</c-form_grid> #}
{# Props: min_width (optional: minimum column width, default "200px"), gap (optional: spacing, default "15px") #}

<c-vars min_width="200px" gap="15px" />

<style>
    .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax({{ min_width }}, 1fr));
        gap: {{ gap }};
        align-items: end;
    }

    .form-grid label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
        font-size: 14px;
    }

    .form-grid input[type="text"],
    .form-grid input[type="email"],
    .form-grid input[type="number"],
    .form-grid select,
    .form-grid textarea {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
    }
</style>

<div class="form-grid">
    {{ slot }}
</div>
