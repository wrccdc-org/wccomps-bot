{% extends "base.html" %}

{% block title %}Error - WCComps Tickets{% endblock %}

{% block content %}
<div id="content-main">
    <div class="page-header">
        <h1 style="color: #ba2121;">{{ error }}</h1>
    </div>

    <div class="module">
        <p style="color: #666; margin-bottom: 20px;">Unable to access tickets</p>

        <fieldset class="module">
            <p>{{ message }}</p>
        </fieldset>

        <p style="margin-top: 20px;">
            If you believe this is an error, please contact an administrator for assistance.
        </p>
    </div>
</div>
{% endblock %}
