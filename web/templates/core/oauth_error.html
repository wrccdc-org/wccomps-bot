{% extends "admin/base_site.html" %}
{% load cotton %}
{% block title %}
    {{ error_title }} - WCComps
{% endblock title %}
{% block content %}
    <div id="content-main">
        <c-page_header title="{{ error_title }}" />
        <c-module>
        <c-alert variant="error">
        <p class="m-0">{{ error_message }}</p>
        </c-alert>
        <p class="mt-20">
            <a href="{% url 'oauth_login' %}">Try again</a>
        </p>
        </c-module>
    </div>
{% endblock content %}
