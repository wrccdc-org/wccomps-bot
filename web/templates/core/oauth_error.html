{% extends "admin/base_site.html" %}
{% load cotton %}
{% block title %}
    {{ error_title }} - WCComps
{% endblock title %}
{% block content %}
    <div id="content-main">
        <c-page_header title="{{ error_title }}" />
        <c-module>
        <c-alert variant="error">
        <p class="m-0">{{ error_message }}</p>
        </c-alert>
        <c-button_row class="mt-20">
        <c-link href="{% url 'oauth_login' %}" variant="default">Try again</c-link>
        </c-button_row>
        </c-module>
    </div>
{% endblock content %}
