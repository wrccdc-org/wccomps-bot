{% extends "admin/base_site.html" %}
{% load static i18n %}

{% block extrastyle %}
{{ block.super }}
<style>
    #content {
        margin-left: 0;
        padding-top: 0;
    }

    #content > .breadcrumbs {
        margin-left: -40px;
        margin-right: -40px;
        padding-left: 40px;
        padding-right: 40px;
    }

    .refresh-indicator {
        position: fixed;
        top: 10px;
        right: 10px;
        background: #417690;
        color: white;
        padding: 8px 15px;
        border-radius: 4px;
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.3s;
        z-index: 9999;
    }

    .refresh-indicator.active {
        opacity: 1;
    }

    /* Table improvements - better density for scanning 50+ rows */
    #result_list td,
    #result_list th {
        padding: 10px 12px;
        line-height: 1.5;
    }

    #result_list tbody tr:hover {
        background-color: #f5f5f5;
    }

    /* Filter bar layout - organized horizontal layout */
    .toolbar {
        background: #f8f8f8;
        padding: 15px;
        border-bottom: 1px solid #ddd;
        margin-bottom: 20px;
    }

    .toolbar form > div > div {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: flex-end;
    }

    .toolbar form > div > div > div {
        display: flex;
        flex-direction: column;
        min-width: 140px;
    }

    .toolbar label {
        font-weight: 600;
        margin-bottom: 4px;
        font-size: 12px;
        color: #333;
    }

    .toolbar input[type="text"],
    .toolbar input[type="number"],
    .toolbar select {
        padding: 6px 10px;
        font-size: 13px;
    }

    /* Button improvements - larger click targets for high-stress use */
    .button,
    input[type="submit"],
    button[type="submit"] {
        padding: 8px 16px !important;
        font-size: 13px !important;
        min-width: 80px;
        cursor: pointer;
    }

    .button:hover,
    input[type="submit"]:hover,
    button[type="submit"]:hover {
        opacity: 0.85;
    }

    /* Status indicators - subtle visual distinction */
    .field-status span {
        display: inline-block;
        padding: 4px 10px;
        font-weight: 600;
        font-size: 12px;
        border-radius: 3px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .field-status span[role="status"][aria-label*="Open"] {
        background: #e3f2fd;
        color: #1976d2;
        border: 1px solid #90caf9;
    }

    .field-status span[role="status"][aria-label*="Claimed"] {
        background: #fff3e0;
        color: #f57c00;
        border: 1px solid #ffb74d;
    }

    .field-status span[role="status"][aria-label*="Resolved"] {
        background: #e8f5e9;
        color: #388e3c;
        border: 1px solid #81c784;
    }

    .field-status span[role="status"][aria-label*="Cancelled"] {
        background: #f5f5f5;
        color: #757575;
        border: 1px solid #bdbdbd;
    }

    /* Team status in mappings page */
    .field-status > div:first-child {
        font-weight: 700;
        font-size: 16px;
    }

    /* Actions column spacing */
    .field-actions form {
        display: inline-block;
        margin-right: 6px;
    }

    /* Make checkbox column narrower */
    .action-checkbox-column {
        width: 40px;
        text-align: center;
    }
</style>
{% endblock %}

{% block extrahead %}
{{ block.super }}
{% if auto_refresh %}
<script>
    setInterval(function() {
        location.reload();
    }, 30000);
</script>
{% endif %}
{% endblock %}
