{% extends "admin/base_site.html" %}
{% load static i18n %}

{% block extrastyle %}
{{ block.super }}
<style>
    #content {
        margin-left: 0;
        padding-top: 0;
    }

    #content > .breadcrumbs {
        margin-left: -40px;
        margin-right: -40px;
        padding-left: 40px;
        padding-right: 40px;
    }

    .refresh-indicator {
        position: fixed;
        top: 10px;
        right: 10px;
        background: #417690;
        color: white;
        padding: 8px 15px;
        border-radius: 4px;
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.3s;
        z-index: 9999;
    }

    .refresh-indicator.active {
        opacity: 1;
    }

    /* Table improvements - better density for scanning 50+ rows */
    #result_list td,
    #result_list th {
        padding: 10px 12px;
        line-height: 1.5;
    }

    #result_list tbody tr:hover {
        background-color: #f5f5f5;
    }

    /* Filter bar layout - organized horizontal layout */
    .toolbar {
        background: #f8f8f8;
        padding: 15px;
        border-bottom: 1px solid #ddd;
        margin-bottom: 20px;
    }

    .toolbar form > div > div {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: flex-end;
    }

    .toolbar form > div > div > div {
        display: flex;
        flex-direction: column;
        min-width: 140px;
    }

    .toolbar label {
        font-weight: 600;
        margin-bottom: 4px;
        font-size: 12px;
        color: #333;
    }

    .toolbar input[type="text"],
    .toolbar input[type="number"],
    .toolbar select {
        padding: 6px 10px;
        font-size: 13px;
    }

    /* Button improvements - larger click targets for high-stress use */
    .button,
    input[type="submit"],
    button[type="submit"] {
        padding: 8px 16px !important;
        font-size: 13px !important;
        min-width: 80px;
        cursor: pointer;
    }

    .button:hover,
    input[type="submit"]:hover,
    button[type="submit"]:hover {
        opacity: 0.85;
    }

    /* Status indicators - subtle visual distinction */
    .field-status span {
        display: inline-block;
        padding: 4px 10px;
        font-weight: 600;
        font-size: 12px;
        border-radius: 3px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .field-status span[role="status"][aria-label*="Open"] {
        background: #e3f2fd;
        color: #1976d2;
        border: 1px solid #90caf9;
    }

    .field-status span[role="status"][aria-label*="Claimed"] {
        background: #fff3e0;
        color: #f57c00;
        border: 1px solid #ffb74d;
    }

    .field-status span[role="status"][aria-label*="Resolved"] {
        background: #e8f5e9;
        color: #388e3c;
        border: 1px solid #81c784;
    }

    .field-status span[role="status"][aria-label*="Cancelled"] {
        background: #f5f5f5;
        color: #757575;
        border: 1px solid #bdbdbd;
    }

    /* Team status in mappings page */
    .field-status > div:first-child {
        font-weight: 700;
        font-size: 16px;
    }

    /* Actions column spacing */
    .field-actions form {
        display: inline-block;
        margin-right: 6px;
    }

    /* Make checkbox column narrower */
    .action-checkbox-column {
        width: 40px;
        text-align: center;
    }

    /* ============================================
       UTILITY CLASSES
       Use these instead of inline styles
       ============================================ */

    /* Text colors */
    .text-muted { color: #666; }
    .text-secondary { color: #999; }
    .text-success { color: #28a745; }
    .text-danger { color: #dc3545; }
    .text-warning { color: #f57c00; }

    /* Text alignment */
    .text-left { text-align: left; }
    .text-center { text-align: center; }
    .text-right { text-align: right; }

    /* Font sizes */
    .text-sm { font-size: 12px; }
    .text-md { font-size: 14px; }

    /* Display */
    .d-inline { display: inline; }
    .d-inline-block { display: inline-block; }
    .d-block { display: block; }

    /* Margins */
    .mt-0 { margin-top: 0; }
    .mt-10 { margin-top: 10px; }
    .mt-20 { margin-top: 20px; }
    .mb-0 { margin-bottom: 0; }
    .mb-8 { margin-bottom: 8px; }
    .mb-10 { margin-bottom: 10px; }
    .mb-15 { margin-bottom: 15px; }
    .mb-20 { margin-bottom: 20px; }
    .m-0 { margin: 0; }

    /* Padding */
    .p-8 { padding: 8px; }
    .p-15 { padding: 15px; }
    .py-5 { padding-top: 5px; padding-bottom: 5px; }

    /* Widths */
    .w-10 { width: 10%; }
    .w-15 { width: 15%; }
    .w-40 { width: 40px; }
    .w-full { width: 100%; }

    /* Borders */
    .border-top { border-top: 1px solid #e2e8f0; }
    .pt-20-border { margin-top: 20px; padding-top: 20px; border-top: 1px solid #e2e8f0; }
</style>
{% endblock %}

{% block extrahead %}
{{ block.super }}
{% if auto_refresh %}
<script>
    setInterval(function() {
        location.reload();
    }, 30000);
</script>
{% endif %}
{% endblock %}
